services:
  - type: web
    name: mercatoria-fuel
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mercatoria-fuel-db
          property: connectionString
      - key: SKIP_MIGRATIONS
        value: false

databases:
  - name: mercatoria-fuel-db
    databaseName: mercatoria_fuel
    user: mercatoria_fuel
