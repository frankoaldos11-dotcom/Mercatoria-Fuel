<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña — Mercatoria Fuel</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #F3F4F6; font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 1.5rem;
        }
        .card-wrap {
            background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 2.5rem 2rem; width: 100%; max-width: 400px; text-align: center;
        }
        .icon { font-size: 2.5rem; color: #E86A2C; margin-bottom: 16px; }
        h2 { font-size: 1.3rem; font-weight: 700; color: #111827; margin-bottom: 10px; }
        p { color: #6B7280; font-size: 0.88rem; line-height: 1.6; }
        .note {
            background: #FEF3C7; border-left: 4px solid #F59E0B; border-radius: 8px;
            padding: 12px 14px; margin-top: 20px; font-size: 0.85rem; color: #92400E; text-align: left;
        }
        .btn-back {
            display: inline-block; margin-top: 24px;
            border: 1.5px solid #D1D5DB; color: #374151; border-radius: 8px;
            padding: 10px 24px; font-weight: 600; text-decoration: none;
            font-size: 0.9rem; transition: border-color 0.15s;
        }
        .btn-back:hover { border-color: #E86A2C; color: #E86A2C; }
    </style>
</head>
<body>
<div class="card-wrap">
    <div class="icon"><i class="bi bi-key-fill"></i></div>
    <h2>Recuperar contraseña</h2>
    <p>Esta funcionalidad estará disponible próximamente.</p>
    <div class="note">
        <i class="bi bi-info-circle"></i> Mientras tanto, contacta al administrador del sistema para restablecer tu acceso.
    </div>
    <a href="/login" class="btn-back"><i class="bi bi-arrow-left"></i> Volver al inicio de sesión</a>
</div>
</body>
</html>
