{% extends "base.html" %}
{% block titulo %}Nuevo Usuario — Mercatoria Fuel{% endblock %}
{% block contenido %}

<div class="page-header">
    <div>
        <span class="eyebrow">Sistema / Usuarios</span>
        <h1>Nuevo usuario</h1>
    </div>
    <a href="/usuarios/" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Volver</a>
</div>

{% if error %}
<div style="background:#FEF2F2;border-left:4px solid #DC2626;color:#991B1B;border-radius:8px;padding:0.75rem 1rem;margin-bottom:1.5rem;font-size:14px;">
    <i class="bi bi-exclamation-circle"></i> {{ error }}
</div>
{% endif %}

<div class="panel">
    <form method="POST" action="/usuarios/crear">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-grid">

            <div class="mb-3">
                <label class="form-label">Nombre completo <span style="color:var(--danger)">*</span></label>
                <input type="text" name="nombre" class="form-control"
                       value="{{ request.form.get('nombre','') }}" required placeholder="Nombre completo">
            </div>

            <div class="mb-3">
                <label class="form-label">Email <span style="color:var(--danger)">*</span></label>
                <input type="email" name="email" class="form-control"
                       value="{{ request.form.get('email','') }}" required placeholder="usuario@ejemplo.com">
            </div>

            <div class="mb-3">
                <label class="form-label">Contraseña <span style="color:var(--danger)">*</span></label>
                <input type="password" name="password" class="form-control"
                       placeholder="Mínimo 8 caracteres" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Confirmar contraseña <span style="color:var(--danger)">*</span></label>
                <input type="password" name="confirm_password" class="form-control"
                       placeholder="Repetir contraseña" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Rol <span style="color:var(--danger)">*</span></label>
                <select name="rol" id="sel-rol" class="form-select" required onchange="toggleRol(this)">
                    <option value="">— Selecciona un rol —</option>
                    {% for r_val, r_label in roles %}
                    <option value="{{ r_val }}" {{ 'selected' if request.form.get('rol', '') == r_val }}>
                        {{ r_label }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3" id="bloque-cliente" style="display:none;">
                <label class="form-label">Cliente vinculado <span style="color:var(--danger)">*</span></label>
                <select name="cliente_id" class="form-select">
                    <option value="">Seleccionar cliente...</option>
                    {% for c in clientes %}
                    <option value="{{ c.id }}" {{ 'selected' if request.form.get('cliente_id','') == c.id|string }}>
                        {{ c.nombre }} ({{ c.codigo }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3" id="bloque-gasolinera" style="display:none;">
                <label class="form-label">Gasolinera asignada <span style="color:var(--danger)">*</span></label>
                <select name="gasolinera_id" class="form-select">
                    <option value="">Seleccionar gasolinera...</option>
                    {% for g in gasolineras %}
                    <option value="{{ g.id }}" {{ 'selected' if request.form.get('gasolinera_id','') == g.id|string }}>
                        {{ g.nombre }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3" style="display:flex;align-items:center;gap:10px;padding-top:28px;">
                <input type="checkbox" name="activo" value="1" id="chk-activo"
                       style="width:18px;height:18px;cursor:pointer;"
                       {{ 'checked' if request.form.get('activo','1') }}>
                <label for="chk-activo" style="cursor:pointer;font-weight:600;font-size:14px;">Usuario activo</label>
            </div>

        </div>

        <div style="padding:0 24px 24px;display:flex;gap:10px;">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> Crear usuario
            </button>
            <a href="/usuarios/" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>

{% endblock %}
{% block scripts %}
<script>
function toggleRol(sel) {
    var v = sel ? sel.value : document.getElementById('sel-rol').value;
    document.getElementById('bloque-cliente').style.display = (v === 'cliente') ? '' : 'none';
    document.getElementById('bloque-gasolinera').style.display = (v === 'operador_gasolinera') ? '' : 'none';
}
toggleRol(null);
</script>
{% endblock %}
