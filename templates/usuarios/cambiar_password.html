{% extends "base.html" %}
{% block titulo %}Cambiar Contraseña — Mercatoria Fuel{% endblock %}
{% block contenido %}

<div class="page-header">
    <div>
        <span class="eyebrow">Mi cuenta</span>
        <h1>Cambiar mi contraseña</h1>
    </div>
    <a href="/dashboard" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Volver</a>
</div>

{% if ok %}
<div style="background:#f0fdf4;border:1px solid #86efac;color:#166534;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-weight:600;">
    <i class="bi bi-check-circle-fill"></i> Contraseña actualizada correctamente.
</div>
{% endif %}

{% if error %}
<div style="background:#FEF2F2;border-left:4px solid #DC2626;color:#991B1B;border-radius:8px;padding:0.75rem 1rem;margin-bottom:1.5rem;font-size:14px;">
    <i class="bi bi-exclamation-circle"></i> {{ error }}
</div>
{% endif %}

<div class="panel" style="max-width:480px;">
    <form method="POST" action="/usuarios/cambiar-password">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div style="padding:24px;display:flex;flex-direction:column;gap:16px;">

            <div>
                <label class="form-label">Contraseña actual <span style="color:var(--danger)">*</span></label>
                <input type="password" name="password_actual" class="form-control"
                       placeholder="Tu contraseña actual" required>
            </div>

            <div>
                <label class="form-label">Nueva contraseña <span style="color:var(--danger)">*</span></label>
                <input type="password" name="password_nueva" class="form-control"
                       placeholder="Mínimo 8 caracteres" required>
            </div>

            <div>
                <label class="form-label">Confirmar nueva contraseña <span style="color:var(--danger)">*</span></label>
                <input type="password" name="confirm_password" class="form-control"
                       placeholder="Repetir nueva contraseña" required>
            </div>

        </div>

        <div style="padding:0 24px 24px;display:flex;gap:10px;">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-key"></i> Cambiar contraseña
            </button>
        </div>
    </form>
</div>

{% endblock %}
