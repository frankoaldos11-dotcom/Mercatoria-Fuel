{% extends "base.html" %}

{% block titulo %}Editar Unidad — Mercatoria Fuel{% endblock %}

{% block contenido %}

<div class="page-header">
    <div>
        <span class="eyebrow">Comercial / Unidades autorizadas</span>
        <h1>Editar unidad</h1>
        <p>Vehículo <strong style="font-family:monospace;">{{ unidad.chapa }}</strong> — {{ unidad.cliente_nombre }}</p>
    </div>
    <a href="/unidades" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Volver
    </a>
</div>

{% if error %}
<div style="background:var(--fondo-peligro-suave);border-left:4px solid var(--peligro);color:var(--texto-sobre-peligro);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1.5rem;font-size:14px;">
    <i class="bi bi-exclamation-circle"></i> {{ error }}
</div>
{% endif %}

<div class="panel">
    <form method="POST" action="/unidades/{{ unidad.id }}/editar">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-grid">

            <!-- Cliente y estado -->
            <div class="mb-3" style="grid-column: 1 / -1;">
                <label class="form-label" style="font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--atenuado-staff);font-weight:600;">Cliente</label>
            </div>

            <div class="mb-3">
                <label class="form-label">Cliente <span style="color:var(--peligro)">*</span></label>
                <select name="cliente_id" class="form-select" required>
                    <option value="">Seleccionar cliente...</option>
                    {% for c in clientes %}
                    <option value="{{ c.id }}" {{ 'selected' if unidad.cliente_id == c.id }}>
                        {{ c.nombre }} ({{ c.codigo }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select name="estado" class="form-select">
                    <option value="activo"   {{ 'selected' if unidad.estado == 'activo' }}>Activo</option>
                    <option value="inactivo" {{ 'selected' if unidad.estado == 'inactivo' }}>Inactivo</option>
                </select>
            </div>

            <!-- Vehículo -->
            <div class="mb-3" style="grid-column: 1 / -1; margin-top:8px;">
                <label class="form-label" style="font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--atenuado-staff);font-weight:600;">Vehículo</label>
            </div>

            <div class="mb-3">
                <label class="form-label">Chapa / Matrícula <span style="color:var(--peligro)">*</span></label>
                <input type="text" name="chapa" class="form-control"
                       value="{{ unidad.chapa }}" style="text-transform:uppercase;" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Tipo de combustible <span style="color:var(--peligro)">*</span></label>
                <select name="tipo_combustible" class="form-select" required>
                    <option value="">Seleccionar...</option>
                    {% for tc in tipos_combustible %}
                    <option value="{{ tc }}" {{ 'selected' if unidad.tipo_combustible == tc }}>
                        {{ combustible_labels.get(tc, tc) }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Marca</label>
                <input type="text" name="marca" class="form-control" value="{{ unidad.marca or '' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Modelo</label>
                <input type="text" name="modelo" class="form-control" value="{{ unidad.modelo or '' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Año</label>
                <input type="number" name="anio" class="form-control"
                       value="{{ unidad.anio or '' }}" min="1950" max="2099">
            </div>

            <div class="mb-3">
                <label class="form-label">Color</label>
                <input type="text" name="color" class="form-control" value="{{ unidad.color or '' }}">
            </div>

            <div class="mb-3" style="grid-column: 1 / -1;">
                <label class="form-label">Observaciones del vehículo</label>
                <textarea name="observaciones" class="form-control" rows="2">{{ unidad.observaciones or '' }}</textarea>
            </div>

            <!-- Chofer -->
            <div class="mb-3" style="grid-column: 1 / -1; margin-top:8px;">
                <label class="form-label" style="font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--atenuado-staff);font-weight:600;">
                    Chofer / Conductor autorizado
                    <span style="font-size:11px;font-weight:400;color:var(--atenuado-staff);text-transform:none;"> — deja en blanco para desvincularlo</span>
                </label>
            </div>

            <div class="mb-3">
                <label class="form-label">Nombre del chofer</label>
                <input type="text" name="chofer_nombre" class="form-control"
                       value="{{ unidad.chofer_nombre or '' }}"
                       placeholder="Nombre completo del conductor">
            </div>

            <div class="mb-3">
                <label class="form-label">C.I. del chofer</label>
                <input type="text" name="chofer_ci" class="form-control"
                       value="{{ unidad.chofer_ci or '' }}"
                       placeholder="Número de cédula de identidad">
            </div>

            <div class="mb-3">
                <label class="form-label">N.° de licencia</label>
                <input type="text" name="licencia_numero" class="form-control"
                       value="{{ unidad.licencia_numero or '' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono del chofer</label>
                <input type="text" name="telefono" class="form-control"
                       value="{{ unidad.telefono or '' }}">
            </div>

        </div>

        <div style="padding:0 24px 24px;display:flex;gap:10px;">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> Guardar cambios
            </button>
            <a href="/unidades" class="btn btn-secondary">Cancelar</a>
        </div>

    </form>
</div>

{% endblock %}
