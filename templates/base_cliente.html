<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Portal Cliente — Mercatoria Fuel{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>

<body>

<div class="app-shell">

    <aside class="sidebar">

        <div class="brand">
            <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="10" height="4" rx="1" fill="#E86A2C"/>
                <rect x="2" y="2" width="4" height="10" rx="1" fill="#E86A2C"/>
                <rect x="20" y="2" width="10" height="4" rx="1" fill="#F5A623"/>
                <rect x="26" y="2" width="4" height="10" rx="1" fill="#F5A623"/>
                <rect x="2" y="26" width="10" height="4" rx="1" fill="#F5A623"/>
                <rect x="2" y="20" width="4" height="10" rx="1" fill="#F5A623"/>
                <rect x="20" y="26" width="10" height="4" rx="1" fill="#E86A2C"/>
                <rect x="26" y="20" width="4" height="10" rx="1" fill="#E86A2C"/>
            </svg>
            <span class="brand-name">Portal Cliente</span>
        </div>

        <nav class="sidebar-nav">

            <div class="nav-section">{{ session.get('nombre', '') }}</div>

            <a href="/portal/" class="nav-item {{ 'nav-item-active' if request.path == '/portal/' else '' }}">
                <i class="bi bi-grid-1x2"></i>
                <span>Mi resumen</span>
            </a>

            <a href="/portal/despachos" class="nav-item {{ 'nav-item-active' if request.path.startswith('/portal/despachos') else '' }}">
                <i class="bi bi-box-arrow-right"></i>
                <span>Mis despachos</span>
            </a>

            <a href="/portal/consumo-mensual" class="nav-item {{ 'nav-item-active' if request.path.startswith('/portal/consumo-mensual') else '' }}">
                <i class="bi bi-bar-chart-line"></i>
                <span>Consumo mensual</span>
            </a>

            <a href="/portal/consumo-vehiculo" class="nav-item {{ 'nav-item-active' if request.path.startswith('/portal/consumo-vehiculo') else '' }}">
                <i class="bi bi-truck"></i>
                <span>Por vehículo</span>
            </a>

            <a href="/portal/consumo-chofer" class="nav-item {{ 'nav-item-active' if request.path.startswith('/portal/consumo-chofer') else '' }}">
                <i class="bi bi-person-badge"></i>
                <span>Por chofer</span>
            </a>

            <a href="/portal/unidades" class="nav-item {{ 'nav-item-active' if request.path.startswith('/portal/unidades') else '' }}">
                <i class="bi bi-card-checklist"></i>
                <span>Mis vehículos</span>
            </a>

            <a href="/portal/habilitaciones" class="nav-item {{ 'nav-item-active' if request.path.startswith('/portal/habilitaciones') else '' }}">
                <i class="bi bi-toggle-on"></i>
                <span>Mis habilitaciones</span>
            </a>

            <hr class="nav-divider">

            <a href="/logout" class="nav-item logout" style="margin-top:16px;">
                <i class="bi bi-box-arrow-right"></i>
                <span>Salir</span>
            </a>

        </nav>

    </aside>

    <main class="main-content">
        {% if request.args.get('ok') %}
        <div style="background:#f0fdf4;border:1px solid #86efac;color:#166534;border-radius:8px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px;">
            <i class="bi bi-check-circle-fill"></i> Operación realizada con éxito.
        </div>
        {% endif %}
        {% block contenido %}{% endblock %}
    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
