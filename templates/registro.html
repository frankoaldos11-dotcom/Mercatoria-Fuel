<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta — Mercatoria Fuel</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #F3F4F6;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card-wrap {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 460px;
        }
        .brand { color: #E86A2C; font-weight: 700; font-size: 1.4rem; text-align: center; }
        .brand small { display: block; font-size: 0.8rem; color: #6B7280; font-weight: 400; margin-top: 2px; }
        .form-label { font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 4px; }
        .form-control {
            border-radius: 8px; border: 1.5px solid #D1D5DB;
            font-size: 0.9rem; padding: 0.65rem 0.75rem; width: 100%;
        }
        .form-control:focus { border-color: #E86A2C; box-shadow: 0 0 0 3px rgba(232,106,44,0.15); outline: none; }
        .btn-submit {
            background: #E86A2C; color: #fff; border: none; border-radius: 8px;
            font-weight: 700; font-size: 0.95rem; padding: 0.65rem; width: 100%;
            transition: background 0.15s; cursor: pointer; margin-top: 0.25rem;
        }
        .btn-submit:hover { background: #C45520; }
        .alert-error {
            background: #FEF2F2; border-left: 4px solid #DC2626; color: #991B1B;
            border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; margin-bottom: 1.25rem;
        }
        .mb-3 { margin-bottom: 1rem; }
        .mb-4b { margin-bottom: 2rem; }
        .link-muted { font-size: 0.82rem; text-align: center; color: #6B7280; margin-top: 1.25rem; }
        .link-muted a { color: #E86A2C; text-decoration: none; }
        .link-muted a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="card-wrap">
    <div class="brand mb-4b">
        <i class="bi bi-fuel-pump-fill"></i> Mercatoria Fuel
        <small>Crea tu cuenta de cliente</small>
    </div>

    {% if error %}
    <div class="alert-error"><i class="bi bi-exclamation-circle"></i> {{ error }}</div>
    {% endif %}

    <form method="POST" action="/registro/">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">Nombre completo *</label>
            <input type="text" name="nombre" class="form-control" required autofocus
                   value="{{ form.get('nombre', '') }}" placeholder="Juan Pérez">
        </div>
        <div class="mb-3">
            <label class="form-label">Empresa u organización <span style="color:#9CA3AF;">(opcional)</span></label>
            <input type="text" name="empresa" class="form-control"
                   value="{{ form.get('empresa', '') }}" placeholder="Mi Empresa S.A.">
        </div>
        <div class="mb-3">
            <label class="form-label">Correo electrónico *</label>
            <input type="email" name="email" class="form-control" required
                   value="{{ form.get('email', '') }}" placeholder="correo@ejemplo.com">
        </div>
        <div class="mb-3">
            <label class="form-label">Contraseña * <span style="color:#9CA3AF;font-size:11px;">(mínimo 8 caracteres)</span></label>
            <input type="password" name="password" class="form-control" required minlength="8">
        </div>
        <div class="mb-3">
            <label class="form-label">Confirmar contraseña *</label>
            <input type="password" name="confirm_password" class="form-control" required>
        </div>
        <button type="submit" class="btn-submit">Crear cuenta</button>
    </form>

    <div class="link-muted">
        ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
    </div>
</div>

</body>
</html>
