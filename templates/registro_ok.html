<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuenta creada — Mercatoria Fuel</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tokens.css">
    <style>
        body {
            background: var(--fondo-cliente); font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 1.5rem;
        }
        .card-wrap {
            background: var(--panel); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 3rem 2rem; width: 100%; max-width: 440px; text-align: center;
        }
        .icon-ok { font-size: 3rem; color: var(--exito); margin-bottom: 20px; }
        h2 { font-size: 1.4rem; font-weight: 700; color: var(--texto-cliente); margin-bottom: 12px; }
        p { color: var(--atenuado-cliente); font-size: 0.92rem; line-height: 1.6; }
        .btn-login {
            display: inline-block; margin-top: 28px;
            background: var(--activo); color: var(--panel); border-radius: 8px;
            padding: 12px 28px; font-weight: 700; text-decoration: none;
            font-size: 0.95rem; transition: background 0.15s;
        }
        .btn-login:hover { background: var(--activo-oscuro); color: var(--panel); }
    </style>
</head>
<body>
<div class="card-wrap">
    <div class="icon-ok"><i class="bi bi-check-circle-fill"></i></div>
    <h2>¡Cuenta creada!</h2>
    <p>Tu solicitud de acceso fue recibida. Un administrador revisará y aprobará tu cuenta en las próximas 24 horas.</p>
    <p style="margin-top:10px;">Recibirás acceso a la plataforma una vez que sea aprobada. Intenta iniciar sesión más tarde.</p>
    <a href="/login" class="btn-login"><i class="bi bi-box-arrow-in-right"></i> Ir al inicio de sesión</a>
</div>
</body>
</html>
