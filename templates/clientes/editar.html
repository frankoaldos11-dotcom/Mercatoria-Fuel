{% extends "base.html" %}

{% block titulo %}Editar Cliente — Mercatoria Fuel{% endblock %}

{% block contenido %}

<div class="page-header">
    <div>
        <span class="eyebrow">Comercial</span>
        <h1>Editar cliente</h1>
        <p>Modifica los datos de <strong>{{ cliente.nombre }}</strong>.</p>
    </div>
    <a href="/clientes/{{ cliente.id }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Volver
    </a>
</div>

{% if error %}
<div style="background:#FEF2F2;border-left:4px solid #DC2626;color:#991B1B;border-radius:8px;padding:0.75rem 1rem;margin-bottom:1.5rem;font-size:14px;">
    <i class="bi bi-exclamation-circle"></i> {{ error }}
</div>
{% endif %}

<div class="panel">
    <form method="POST" action="/clientes/{{ cliente.id }}/editar">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-grid">

            <div class="mb-3">
                <label class="form-label">Nombre <span style="color:var(--danger)">*</span></label>
                <input type="text" name="nombre" class="form-control"
                       value="{{ cliente.nombre }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Código <span style="color:var(--danger)">*</span></label>
                <input type="text" name="codigo" class="form-control"
                       value="{{ cliente.codigo }}" required
                       style="text-transform:uppercase;">
            </div>


            <div class="mb-3">
                <label class="form-label">Nombre de contacto</label>
                <input type="text" name="contacto_nombre" class="form-control"
                       value="{{ cliente.contacto_nombre or '' }}">
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono de contacto</label>
                <input type="text" name="contacto_telefono" class="form-control"
                       value="{{ cliente.contacto_telefono or '' }}">
            </div>

            <div class="mb-3" style="grid-column: 1 / -1;">
                <label class="form-label">Email de contacto</label>
                <input type="email" name="contacto_email" class="form-control"
                       value="{{ cliente.contacto_email or '' }}">
            </div>

            <div class="mb-3" style="grid-column: 1 / -1;">
                <label class="form-label">Notas</label>
                <textarea name="notas" class="form-control" rows="3">{{ cliente.notas or '' }}</textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select name="activo" class="form-select">
                    <option value="1" {{ 'selected' if cliente.activo }}>Activo</option>
                    <option value="0" {{ 'selected' if not cliente.activo }}>Inactivo</option>
                </select>
            </div>

        </div>

        <div style="padding:0 24px 24px;display:flex;gap:10px;">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> Guardar cambios
            </button>
            <a href="/clientes/{{ cliente.id }}" class="btn btn-secondary">Cancelar</a>
        </div>

    </form>
</div>

{% endblock %}
