<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR inválido — Mercatoria Fuel</title>
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tokens.css">
    <style>
        body {
            background: var(--fondo-cliente); font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 1.5rem;
        }
        .card { background: var(--panel); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
                padding: 3rem 2rem; width: 100%; max-width: 400px; text-align: center; }
        .icon { font-size: 3rem; color: var(--peligro); margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon"><i class="bi bi-x-octagon-fill"></i></div>
    <h2 style="font-size:1.3rem;font-weight:700;color:var(--texto-cliente);margin-bottom:10px;">QR inválido</h2>
    <p style="color:var(--atenuado-cliente);font-size:0.9rem;">Este código QR no existe o ya fue utilizado.</p>
    <a href="/" style="display:inline-block;margin-top:20px;background:var(--activo);color:var(--panel);border-radius:8px;padding:10px 24px;font-weight:700;text-decoration:none;">Ir al inicio</a>
</div>
</body>
</html>
