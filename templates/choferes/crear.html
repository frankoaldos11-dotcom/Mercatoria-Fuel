{% extends "base.html" %}

{% block titulo %}Nuevo Chofer — Mercatoria Fuel{% endblock %}

{% block contenido %}

<div class="page-header">
    <div>
        <span class="eyebrow">Comercial</span>
        <h1>Nuevo chofer</h1>
        <p>Registra un conductor para recibir despachos de combustible.</p>
    </div>
    <a href="/choferes" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> Volver
    </a>
</div>

{% if error %}
<div style="background:var(--fondo-peligro-suave);border-left:4px solid var(--peligro);color:var(--texto-sobre-peligro);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1.5rem;font-size:14px;">
    <i class="bi bi-exclamation-circle"></i> {{ error }}
</div>
{% endif %}

<div class="panel">
    <form method="POST" action="/choferes/crear">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-grid">

            <div class="mb-3">
                <label class="form-label">Nombre completo <span style="color:var(--peligro)">*</span></label>
                <input type="text" name="nombre" class="form-control"
                       placeholder="Nombre y apellidos" required>
            </div>

            <div class="mb-3">
                <label class="form-label">C.I. (Carnet de identidad) <span style="color:var(--peligro)">*</span></label>
                <input type="text" name="ci" class="form-control"
                       placeholder="Número de C.I." required>
            </div>

            <div class="mb-3">
                <label class="form-label">Cliente <span style="color:var(--peligro)">*</span></label>
                <select name="cliente_id" class="form-select" required>
                    <option value="">Seleccionar...</option>
                    {% for c in clientes %}
                    <option value="{{ c.id }}" {{ 'selected' if cliente_preseleccionado == c.id|string }}>
                        {{ c.nombre }} ({{ c.codigo }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">N° de licencia</label>
                <input type="text" name="licencia_numero" class="form-control"
                       placeholder="Número de licencia de conducción">
            </div>

            <div class="mb-3">
                <label class="form-label">Vencimiento de licencia</label>
                <input type="date" name="licencia_vencimiento" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono</label>
                <input type="text" name="telefono" class="form-control"
                       placeholder="+53 5 000 0000">
            </div>

            <div class="mb-3" style="grid-column: 1 / -1;">
                <label class="form-label">Observaciones</label>
                <textarea name="observaciones" class="form-control" rows="2"
                          placeholder="Restricciones, notas adicionales, etc."></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select name="estado" class="form-select">
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select>
            </div>

        </div>

        <div style="padding:0 24px 24px;display:flex;gap:10px;">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg"></i> Guardar chofer
            </button>
            <a href="/choferes" class="btn btn-secondary">Cancelar</a>
        </div>

    </form>
</div>

{% endblock %}
