<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Mercatoria Fuel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tokens.css">
    <style>
        body {
            background: var(--fondo-cliente);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-card {
            background: var(--panel);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
        }
        .brand { color: var(--activo); font-weight: 700; font-size: 1.4rem; text-align: center; }
        .brand small { display: block; font-size: 0.8rem; color: var(--atenuado-cliente); font-weight: 400; margin-top: 2px; }
        .form-label { font-size: 0.82rem; font-weight: 600; color: var(--color-gray-label-text); margin-bottom: 4px; }
        .form-control {
            border-radius: 8px;
            border: 1.5px solid var(--color-gray-border-alt-upper);
            font-size: 0.9rem;
            padding: 0.65rem 0.75rem;
            width: 100%;
        }
        .form-control:focus {
            border-color: var(--activo);
            box-shadow: 0 0 0 3px rgba(241,106,48,0.15);
            outline: none;
        }
        .btn-login {
            background: var(--activo);
            color: var(--panel);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 0.65rem;
            width: 100%;
            transition: background 0.15s;
            cursor: pointer;
            margin-top: 0.25rem;
        }
        .btn-login:hover { background: var(--activo-oscuro); }
        .alert-error-custom {
            background: var(--fondo-peligro-suave);
            border-left: 4px solid var(--peligro);
            color: var(--texto-sobre-peligro);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
        }
        .mb-3 { margin-bottom: 1rem; }
        .mb-4 { margin-bottom: 1.5rem; }
        .mb-4-brand { margin-bottom: 2rem; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand mb-4-brand">
        <i class="bi bi-fuel-pump-fill"></i> Mercatoria Fuel
        <small>Control operacional de combustible</small>
    </div>

    {% if error %}
    <div class="alert-error-custom">
        <i class="bi bi-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <form action="/login" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" name="email" class="form-control" placeholder="correo@mercatoria.com" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login">Ingresar</button>
    </form>
    <div style="text-align:center;margin-top:1.25rem;font-size:0.82rem;color:var(--atenuado-cliente);">
        ¿No tienes cuenta? <a href="/registro" style="color:var(--activo);text-decoration:none;">Regístrate</a>
        &nbsp;·&nbsp;
        <a href="/recuperar" style="color:var(--color-gray-muted-alt);text-decoration:none;">Olvidé mi contraseña</a>
    </div>
</div>

</body>
</html>
